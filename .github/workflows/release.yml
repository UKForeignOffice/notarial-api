name: Release

on:
  push:
    branches: ["main", "[0-9].*.*"]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@master

      - name: Setup node env 🏗
        uses: actions/setup-node@v4
        with:
          node-version: 22
          check-latest: true

      - name: Install dependencies 👨🏻‍
        run: yarn install

      - name: Release 🚀
        run: yarn release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}